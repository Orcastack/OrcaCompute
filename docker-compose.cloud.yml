name: orca-cloud

networks:
  orcacompute-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  letsencrypt:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
  kafka_data:
  zookeeper_data:
  zookeeper_logs:
  home_node_modules:
  login_node_modules:
  cloud_node_modules:
  developer_node_modules:
  matrix_node_modules:
  frontend_dev_node_modules:

services:
  db:
    image: postgres:15-alpine
    container_name: orcacompute_db
    environment:
      POSTGRES_DB: orcacompute
      POSTGRES_USER: orcacompute_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orcacompute-dev-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orcacompute-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: orcacompute_redis
    volumes:
      - redis_data:/data
    networks:
      - orcacompute-net
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: orcacompute_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-orcacompute-dev-rabbitmq}
      RABBITMQ_DEFAULT_VHOST: orcacompute
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    networks:
      - orcacompute-net
    restart: unless-stopped

  zookeeper:
    image: zookeeper:3.8
    container_name: orcacompute_zookeeper
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zookeeper:2888:3888
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    ports:
      - "2181:2181"
      - "8080:8080"
    networks:
      - orcacompute-net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: orcacompute_kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    networks:
      - orcacompute-net
    restart: unless-stopped

  backend:
    profiles: [prod]
    build:
      context: ./computeapi
      dockerfile: Dockerfile
    container_name: orcacompute_api_prod
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn orcacompute.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      POSTGRES_USER: orcacompute_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orcacompute-dev-postgres}
      DATABASE_URL: "postgresql://orcacompute_user:${POSTGRES_PASSWORD:-orcacompute-dev-postgres}@db:5432/orcacompute"
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-replace-with-production-secret}
      ALLOWED_HOSTS: orcacompute.org,api.orcacompute.org,www.orcacompute.org
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-orcacompute-dev-rabbitmq}@rabbitmq:5672/"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
      - redis
      - rabbitmq
      - kafka
    networks:
      - orcacompute-net
    restart: always

  frontend:
    profiles: [prod]
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: orcacompute_webapp_prod
    expose:
      - "80"
    networks:
      - orcacompute-net
    restart: always

  nginx:
    profiles: [prod]
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: orcacompute_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
      - /var/log/atonix-nginx:/var/log/nginx
    networks:
      - orcacompute-net
    restart: always

  backend-dev:
    build:
      context: ./computeapi
      dockerfile: Dockerfile
    container_name: orcacompute_api_dev
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./computeapi:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      ENVIRONMENT: development
      DEBUG: "True"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orcacompute-dev-postgres}
      DATABASE_URL: "postgresql://orcacompute_user:${POSTGRES_PASSWORD:-orcacompute-dev-postgres}@db:5432/orcacompute"
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret}
      ALLOWED_HOSTS: localhost,127.0.0.1,backend-dev,proxy,login.localhost,cloud.localhost,developer.localhost,matrix.localhost
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-orcacompute-dev-rabbitmq}@rabbitmq:5672/"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: "true"
      PROMETHEUS_PUSHGATEWAY_URL: http://pushgateway:9091
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - rabbitmq
      - kafka
    networks:
      - orcacompute-net
    restart: unless-stopped

  frontend-dev:
    profiles: [devtools]
    image: node:20-alpine
    container_name: orcacompute_webapp_dev
    working_dir: /app
    volumes:
      - ./webapp:/app
      - frontend_dev_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_URL: http://localhost:3000/api
      REACT_APP_WS_URL: ws://localhost:3000/ws
      REACT_APP_ENVIRONMENT: development
      HOST: 0.0.0.0
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
      REACT_APP_PORTAL_VARIANT: developer
      REACT_APP_PORTAL_PUBLIC_PORT: 3000
    command: sh -c "rm -rf /app/node_modules/* && npm install --legacy-peer-deps && npm start"
    expose:
      - "3000"
    depends_on:
      - backend-dev
    networks:
      - orcacompute-net
    restart: unless-stopped

  x-portal-webapp: &portal-webapp
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        PUBLIC_URL: /
        REACT_APP_API_URL: http://localhost:3000/api
        REACT_APP_WS_URL: ws://localhost:3000/ws
        REACT_APP_ENVIRONMENT: local-multi-dashboard
    image: orcacompute-portal-webapp:local
    environment:
      REACT_APP_PORTAL_PUBLIC_PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - orcacompute-net
    restart: unless-stopped

  home:
    <<: *portal-webapp
    container_name: orcacompute_portal_home

  login:
    <<: *portal-webapp
    container_name: orcacompute_portal_login

  cloud:
    <<: *portal-webapp
    container_name: orcacompute_portal_cloud

  developer:
    <<: *portal-webapp
    container_name: orcacompute_portal_developer

  matrix:
    <<: *portal-webapp
    container_name: orcacompute_portal_matrix

  proxy:
    image: nginx:stable-alpine
    container_name: orcacompute_portal_proxy
    ports:
      - "3000:80"
    volumes:
      - ./nginx/multi-dashboard.local.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - home
      - login
      - cloud
      - developer
      - matrix
      - backend-dev
    networks:
      - orcacompute-net
    restart: unless-stopped

  pushgateway:
    profiles: [observability]
    image: prom/pushgateway:latest
    container_name: orcacompute_pushgateway
    ports:
      - "9091:9091"
    networks:
      - orcacompute-net
    restart: unless-stopped

  prometheus:
    profiles: [observability]
    image: prom/prometheus:latest
    container_name: orcacompute_prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    networks:
      - orcacompute-net
    restart: unless-stopped

  grafana:
    profiles: [observability]
    image: grafana/grafana:latest
    container_name: orcacompute_grafana
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks:
      - orcacompute-net
    restart: unless-stopped

  kafka-ui:
    profiles: [tools]
    image: provectuslabs/kafka-ui:latest
    container_name: orcacompute_kafka_ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8090:8080"
    networks:
      - orcacompute-net
    restart: unless-stopped

  elasticsearch:
    profiles: [logging]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: orcacompute_elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - orcacompute-net
    restart: unless-stopped

  logstash:
    profiles: [logging]
    image: docker.elastic.co/logstash/logstash:8.8.0
    container_name: orcacompute_logstash
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./monitoring/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    networks:
      - orcacompute-net
    restart: unless-stopped

  kibana:
    profiles: [logging]
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: orcacompute_kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - orcacompute-net
    restart: unless-stopped

  jaeger:
    profiles: [observability]
    image: jaegertracing/all-in-one:latest
    container_name: orcacompute_jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
    networks:
      - orcacompute-net
    restart: unless-stopped

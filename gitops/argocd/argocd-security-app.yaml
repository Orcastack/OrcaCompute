apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orcacompute-security
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/orcacompute/orcacompute'
    targetRevision: HEAD
    path: k8s/overlays/security
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: orcacompute
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

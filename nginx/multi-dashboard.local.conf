map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream home_frontend {
    server home:80;
}

upstream login_frontend {
    server login:80;
}

upstream cloud_frontend {
    server cloud-webapp:80;
}

upstream developer_frontend {
    server developer:80;
}

upstream matrix_frontend {
    server matrix:80;
}

upstream django_backend {
    server backend-dev:8000;
}

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;

server {
    listen 80;
    server_name localhost 127.0.0.1;

    location = /login {
        return 302 http://localhost:3001/;
    }

    location = /cloud {
        return 302 http://localhost:3002/dashboard;
    }

    location = /developer {
        return 302 http://localhost:3003/developer/Dashboard;
    }

    location = /matrix {
        return 302 http://localhost:3004/matrix;
    }

    location /api/ {
        proxy_pass http://django_backend;
    }

    location /admin/ {
        proxy_pass http://django_backend;
    }

    location /ws/ {
        proxy_pass http://django_backend;
    }

    location /static/ {
        alias /var/www/static/;
    }

    location /media/ {
        alias /var/www/media/;
    }

    location / {
        proxy_pass http://home_frontend;
    }
}


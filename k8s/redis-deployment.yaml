apiVersion: apps/v1
kind: Deployment
metadata:
  name: orcacompute-redis
  namespace: orcacompute
  labels:
    app: orcacompute-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orcacompute-redis
  template:
    metadata:
      labels:
        app: orcacompute-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "yes"]
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: orcacompute-redis
  namespace: orcacompute
spec:
  selector:
    app: orcacompute-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP

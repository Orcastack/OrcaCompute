---
# ConfigMap — all non-secret backend environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: orcacompute-backend-config
  namespace: orcacompute
data:
  DJANGO_SETTINGS_MODULE: "orcacompute.settings"
  ALLOWED_HOSTS: "orcacompute.com,api.orcacompute.com,orcacompute-backend"
  DEBUG: "false"
  DATABASE_URL: "postgresql://orcacompute:changeme@orcacompute-postgres:5432/orcacompute"
  REDIS_URL: "redis://orcacompute-redis:6379/0"
  RABBITMQ_URL: "amqp://admin:changeme@orcacompute-rabbitmq:5672/"
  KAFKA_BOOTSTRAP_SERVERS: "orcacompute-kafka:9092"
  KAFKA_ENABLED: "true"
  PROMETHEUS_PUSHGATEWAY_URL: "http://orcacompute-pushgateway:9091"
  CORS_ALLOWED_ORIGINS: "https://orcacompute.com,https://app.orcacompute.com"
  OS_CLOUD: "orcacompute"
  OS_REGION_NAME: "RegionOne"

---
# Secret — sensitive credentials (values are base64 placeholders; override via Helm or external secrets)
apiVersion: v1
kind: Secret
metadata:
  name: orcacompute-backend-secret
  namespace: orcacompute
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production"
  OS_AUTH_URL: ""
  OS_USERNAME: ""
  OS_PASSWORD: ""
  OS_PROJECT_NAME: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orcacompute-backend
  namespace: orcacompute
  labels:
    app: orcacompute-backend
    ax/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orcacompute-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: orcacompute-backend
        ax/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: ghcr.io/orcacompute/orcacompute-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: DJANGO_SETTINGS_MODULE
            - name: ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: ALLOWED_HOSTS
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: DEBUG
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: REDIS_URL
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: RABBITMQ_URL
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: KAFKA_ENABLED
            - name: PROMETHEUS_PUSHGATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: PROMETHEUS_PUSHGATEWAY_URL
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: CORS_ALLOWED_ORIGINS
            - name: OS_CLOUD
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: OS_CLOUD
            - name: OS_REGION_NAME
              valueFrom:
                configMapKeyRef:
                  name: orcacompute-backend-config
                  key: OS_REGION_NAME
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: orcacompute-backend-secret
                  key: SECRET_KEY
            - name: OS_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: orcacompute-backend-secret
                  key: OS_AUTH_URL
                  optional: true
            - name: OS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: orcacompute-backend-secret
                  key: OS_USERNAME
                  optional: true
            - name: OS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orcacompute-backend-secret
                  key: OS_PASSWORD
                  optional: true
            - name: OS_PROJECT_NAME
              valueFrom:
                secretKeyRef:
                  name: orcacompute-backend-secret
                  key: OS_PROJECT_NAME
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: static-files
              mountPath: /app/staticfiles
            - name: media-files
              mountPath: /app/media
      volumes:
        - name: static-files
          persistentVolumeClaim:
            claimName: orcacompute-static-pvc
        - name: media-files
          persistentVolumeClaim:
            claimName: orcacompute-media-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: orcacompute-backend
  namespace: orcacompute
  labels:
    app: orcacompute-backend
spec:
  selector:
    app: orcacompute-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP

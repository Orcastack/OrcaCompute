apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: orcacompute-com-cert
  namespace: orcacompute
spec:
  secretName: orcacompute-com-tls
  dnsNames:
  - api.orcacompute.com
  - www.orcacompute.com
  - orcacompute.com
  issuerRef:
    name: letsencrypt-dns-cloudflare-staging
    kind: ClusterIssuer
  privateKey:
    algorithm: RSA
    size: 2048
  commonName: orcacompute.com

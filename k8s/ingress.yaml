apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orcacompute-ingress
  namespace: orcacompute
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    # WebSocket upgrade for /ws/ paths
    nginx.ingress.kubernetes.io/proxy-set-headers: "orcacompute/websocket-headers"
spec:
  tls:
    - hosts:
        - orcacompute.com
        - api.orcacompute.com
      secretName: orcacompute-tls
  rules:
    # Main domain: SPA frontend + API + WebSocket on same host
    - host: orcacompute.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: orcacompute-backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: orcacompute-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orcacompute-frontend
                port:
                  number: 80
    # API subdomain routes all traffic to backend
    - host: api.orcacompute.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orcacompute-backend
                port:
                  number: 8000

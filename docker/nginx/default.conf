# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name orcacompute.com www.orcacompute.com api.orcacompute.com;

    return 301 https://$host$request_uri;
}

# Frontend: orcacompute.com
server {
    listen 443 ssl;
    server_name orcacompute.com www.orcacompute.com;

    ssl_certificate /etc/letsencrypt/live/orcacompute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orcacompute.com/privkey.pem;

    resolver 127.0.0.11 ipv6=off;

    location / {
        proxy_pass http://orcacompute_frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
    }

    # Prometheus-compatible Nginx status endpoint
    location /nginx_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        allow 10.4.1.127;  # Prometheus IP
        deny all;
    }

    access_log /var/log/nginx/orcacompute_frontend_access.log;
    error_log /var/log/nginx/orcacompute_frontend_error.log;
}

# Backend: api.orcacompute.com
server {
    listen 443 ssl;
    server_name api.orcacompute.com;

    ssl_certificate /etc/letsencrypt/live/orcacompute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orcacompute.com/privkey.pem;

    resolver 127.0.0.11 ipv6=off;

    location / {
        proxy_pass http://orcacompute_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
    }

    access_log /var/log/nginx/orcacompute_api_access.log;
    error_log /var/log/nginx/orcacompute_api_error.log;
}
---
platform: linux

image_resource:
  type: docker-image
  source:
    repository: docker
    tag: dind

inputs:
  - name: orcacompute-source

outputs:
  - name: build-output

run:
  path: sh
  args:
    - -c
    - |
      set -e
      
      echo "Building OrcaCompute application..."
      cd orcacompute-source
      
      # Build Docker image
      echo "Building Docker image..."
      docker build -f Dockerfile.fullstack -t orcacompute:build .
      
      # Create build artifacts
      echo "Creating build artifacts..."
      mkdir -p ../build-output
      
      # Save build info
      cat > ../build-output/build-info.json << EOF
      {
        "build_time": "$(date -Iseconds)",
        "git_commit": "$(git rev-parse HEAD)",
        "git_branch": "$(git branch --show-current)",
        "docker_image": "orcacompute:build",
        "build_number": "${BUILD_NAME:-unknown}"
      }
      EOF
      
      # Export image (optional)
      echo "Exporting Docker image..."
      docker save orcacompute:build | gzip > ../build-output/orcacompute.tar.gz
      
      echo "Build completed successfully"
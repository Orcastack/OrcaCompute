# Pipeline definitions
- pipeline:
    name: check
    description: Newly uploaded patchsets enter this pipeline to receive an automated code review
    manager: IndependentPipelineManager
    precedence: low
    require:
      gerrit:
        open: True
        current-patchset: True
    trigger:
      gerrit:
        - event: patchset-created
        - event: change-restored
        - event: comment-added
          comment: (?i)^(Patch Set [0-9]+:)?( [\w\\+-]*)*(\n\n)?\s*recheck
    start:
      gerrit:
        Verified: 0
    success:
      gerrit:
        Verified: 1
    failure:
      gerrit:
        Verified: -1
    footer-message: |
      For CI results, see: {check.url}

- pipeline:
    name: gate
    description: Changes that have been approved by core reviewers are enqueued in order in this pipeline
    manager: DependentPipelineManager
    precedence: high
    supercedes: check
    require:
      gerrit:
        open: True
        current-patchset: True
        approval:
          - Workflow: 1
    trigger:
      gerrit:
        - event: comment-added
          approval:
            - Workflow: 1
        - event: comment-added
          comment: (?i)^(Patch Set [0-9]+:)?( [\w\\+-]*)*(\n\n)?\s*regate
    start:
      gerrit:
        Verified: 0
    success:
      gerrit:
        Verified: 2
        submit: true
    failure:
      gerrit:
        Verified: -2
    footer-message: |
      Build succeeded (gate pipeline). For CI results, see: {gate.url}

- pipeline:
    name: post
    description: This pipeline runs jobs that operate after each change is merged
    manager: IndependentPipelineManager
    precedence: low
    trigger:
      gerrit:
        - event: ref-updated
          ref: ^refs/heads/.*$

- pipeline:
    name: tag
    description: This pipeline runs jobs in response to any tag event
    manager: IndependentPipelineManager
    precedence: low
    trigger:
      gerrit:
        - event: ref-updated
          ref: ^refs/tags/.*$

- pipeline:
    name: release
    description: When a commit is tagged as a release, this pipeline runs jobs that publish archives and documentation
    manager: IndependentPipelineManager
    precedence: high
    trigger:
      gerrit:
        - event: ref-updated
          ref: ^refs/tags/[0-9]+(\.[0-9]+)*$

# Job definitions
- job:
    name: base
    parent: null
    description: The base job for all OrcaCompute jobs
    pre-run: playbooks/base/pre.yaml
    post-run: playbooks/base/post.yaml
    roles:
      - zuul: orcacompute-config
    timeout: 1800
    attempts: 3
    secrets:
      - name: npm_registry
        secret: npm-registry-credentials

- job:
    name: orcacompute-lint
    parent: base
    description: Lint check for OrcaCompute platform
    run: playbooks/lint/run.yaml

- job:
    name: orcacompute-test-unit
    parent: base
    description: Unit tests for OrcaCompute platform
    run: playbooks/test/unit.yaml

- job:
    name: orcacompute-test-integration
    parent: base
    description: Integration tests for OrcaCompute platform
    run: playbooks/test/integration.yaml

- job:
    name: orcacompute-security-scan
    parent: base
    description: Security scanning for OrcaCompute platform
    run: playbooks/security/scan.yaml

- job:
    name: orcacompute-build-image
    parent: base
    description: Build container image for OrcaCompute platform
    run: playbooks/build/image.yaml

- job:
    name: orcacompute-deploy-staging
    parent: base
    description: Deploy to staging environment
    run: playbooks/deploy/staging.yaml

- job:
    name: orcacompute-deploy-production
    parent: base
    description: Deploy to production environment
    run: playbooks/deploy/production.yaml


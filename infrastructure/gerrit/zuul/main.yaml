# Zuul Configuration for OrcaCompute CI/CD

- tenant:
    name: orcacompute
    source:
      gerrit:
        config-projects:
          - orcacompute-config
        untrusted-projects:
          - orcacompute
          - orcacompute-frontend
          - orcacompute-backend
          - orcacompute-infrastructure

- connection:
    driver: gerrit
    name: gerrit
    server: gerrit
    port: 29418
    baseurl: http://gerrit:8080
    user: zuul
    sshkey: /var/lib/zuul/.ssh/id_rsa

- connection:
    driver: git
    name: github
    baseurl: https://github.com


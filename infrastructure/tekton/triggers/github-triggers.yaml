apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: orcacompute-github-listener
  namespace: orcacompute-tekton
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/pipelines.minVersion: "0.29.0"
    tekton.dev/categories: Triggers
    tekton.dev/tags: github, webhook, git
    tekton.dev/displayName: "GitHub Event Listener"
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
  - name: github-push-trigger
    interceptors:
    - ref:
        name: "github"
      params:
      - name: "secretRef"
        value:
          secretName: github-secret
          secretKey: secretToken
      - name: "eventTypes"
        value: ["push"]
    bindings:
    - ref: github-push-binding
    template:
      ref: orcacompute-ci-template

  - name: github-pr-trigger
    interceptors:
    - ref:
        name: "github"
      params:
      - name: "secretRef"
        value:
          secretName: github-secret
          secretKey: secretToken
      - name: "eventTypes"
        value: ["pull_request"]
    bindings:
    - ref: github-pr-binding
    template:
      ref: orcacompute-pr-template

  - name: github-release-trigger
    interceptors:
    - ref:
        name: "github"
      params:
      - name: "secretRef"
        value:
          secretName: github-secret
          secretKey: secretToken
      - name: "eventTypes"
        value: ["release"]
    bindings:
    - ref: github-release-binding
    template:
      ref: orcacompute-release-template

---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
  namespace: orcacompute-tekton
spec:
  params:
  - name: gitrevision
    value: $(body.head_commit.id)
  - name: gitrepositoryurl
    value: $(body.repository.clone_url)
  - name: gitrepositoryname
    value: $(body.repository.name)
  - name: gitbranch
    value: $(body.ref)
  - name: gitcommitmessage
    value: $(body.head_commit.message)
  - name: gitcommitter
    value: $(body.head_commit.committer.name)
  - name: timestamp
    value: $(body.head_commit.timestamp)

---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-pr-binding
  namespace: orcacompute-tekton
spec:
  params:
  - name: gitrevision
    value: $(body.pull_request.head.sha)
  - name: gitrepositoryurl
    value: $(body.pull_request.head.repo.clone_url)
  - name: gitrepositoryname
    value: $(body.pull_request.head.repo.name)
  - name: gitbranch
    value: $(body.pull_request.head.ref)
  - name: prnumber
    value: $(body.pull_request.number)
  - name: prtitle
    value: $(body.pull_request.title)
  - name: prauthor
    value: $(body.pull_request.user.login)
  - name: action
    value: $(body.action)

---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-release-binding
  namespace: orcacompute-tekton
spec:
  params:
  - name: gitrevision
    value: $(body.release.tag_name)
  - name: gitrepositoryurl
    value: $(body.repository.clone_url)
  - name: gitrepositoryname
    value: $(body.repository.name)
  - name: releasename
    value: $(body.release.name)
  - name: releasetag
    value: $(body.release.tag_name)
  - name: releaseauthor
    value: $(body.release.author.login)
  - name: releaseprerelease
    value: $(body.release.prerelease)

---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: orcacompute-ci-template
  namespace: orcacompute-tekton
spec:
  params:
  - name: gitrevision
    description: The git revision
    default: main
  - name: gitrepositoryurl
    description: The git repository url
  - name: gitrepositoryname
    description: The git repository name
  - name: gitbranch
    description: The git branch
    default: refs/heads/main
  - name: gitcommitmessage
    description: The git commit message
    default: ""
  - name: gitcommitter
    description: The git committer
    default: ""
  resourcetemplates:
  - apiVersion: tekton.dev/v1beta1
    kind: PipelineRun
    metadata:
      generateName: orcacompute-ci-$(tt.params.gitrepositoryname)-
      namespace: orcacompute-tekton
      labels:
        tekton.dev/pipeline: orcacompute-ci-pipeline
        git.revision: $(tt.params.gitrevision)
        git.branch: $(tt.params.gitbranch)
        trigger.type: github-push
    spec:
      pipelineRef:
        name: orcacompute-ci-pipeline
      params:
      - name: repo-url
        value: $(tt.params.gitrepositoryurl)
      - name: revision
        value: $(tt.params.gitrevision)
      - name: image-reference
        value: "orcacompute:$(tt.params.gitrevision)"
      workspaces:
      - name: shared-data
        volumeClaimTemplate:
          spec:
            accessModes:
            - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
      - name: docker-credentials
        secret:
          secretName: docker-registry-secret

---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: orcacompute-pr-template
  namespace: orcacompute-tekton
spec:
  params:
  - name: gitrevision
    description: The git revision
  - name: gitrepositoryurl
    description: The git repository url
  - name: gitrepositoryname
    description: The git repository name
  - name: gitbranch
    description: The git branch
  - name: prnumber
    description: Pull request number
  - name: prtitle
    description: Pull request title
  - name: prauthor
    description: Pull request author
  - name: action
    description: PR action (opened, synchronize, closed)
  resourcetemplates:
  - apiVersion: tekton.dev/v1beta1
    kind: PipelineRun
    metadata:
      generateName: orcacompute-pr-$(tt.params.gitrepositoryname)-$(tt.params.prnumber)-
      namespace: orcacompute-tekton
      labels:
        tekton.dev/pipeline: orcacompute-ci-pipeline
        git.revision: $(tt.params.gitrevision)
        git.branch: $(tt.params.gitbranch)
        pr.number: $(tt.params.prnumber)
        trigger.type: github-pr
    spec:
      pipelineRef:
        name: orcacompute-ci-pipeline
      params:
      - name: repo-url
        value: $(tt.params.gitrepositoryurl)
      - name: revision
        value: $(tt.params.gitrevision)
      - name: image-reference
        value: "orcacompute:pr-$(tt.params.prnumber)"
      - name: test-type
        value: "all"
      workspaces:
      - name: shared-data
        volumeClaimTemplate:
          spec:
            accessModes:
            - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
      - name: docker-credentials
        secret:
          secretName: docker-registry-secret

---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: orcacompute-release-template
  namespace: orcacompute-tekton
spec:
  params:
  - name: gitrevision
    description: The git revision
  - name: gitrepositoryurl
    description: The git repository url
  - name: gitrepositoryname
    description: The git repository name
  - name: releasename
    description: Release name
  - name: releasetag
    description: Release tag
  - name: releaseauthor
    description: Release author
  - name: releaseprerelease
    description: Is prerelease
  resourcetemplates:
  - apiVersion: tekton.dev/v1beta1
    kind: PipelineRun
    metadata:
      generateName: orcacompute-release-$(tt.params.releasetag)-
      namespace: orcacompute-tekton
      labels:
        tekton.dev/pipeline: orcacompute-full-pipeline
        git.revision: $(tt.params.gitrevision)
        release.tag: $(tt.params.releasetag)
        trigger.type: github-release
    spec:
      pipelineRef:
        name: orcacompute-full-pipeline
      params:
      - name: repo-url
        value: $(tt.params.gitrepositoryurl)
      - name: revision
        value: $(tt.params.gitrevision)
      - name: image-reference
        value: "orcacompute:$(tt.params.releasetag)"
      - name: skip-production
        value: $(tt.params.releaseprerelease)
      workspaces:
      - name: shared-data
        volumeClaimTemplate:
          spec:
            accessModes:
            - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
      - name: docker-credentials
        secret:
          secretName: docker-registry-secret
      - name: kubeconfig
        secret:
          secretName: kubeconfig-secret
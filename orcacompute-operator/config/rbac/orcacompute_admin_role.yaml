# This rule is not used by the project orcacompute-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over cache.orcacompute.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: orcacompute-operator
    app.kubernetes.io/managed-by: kustomize
  name: orcacompute-admin-role
rules:
- apiGroups:
  - cache.orcacompute.com
  resources:
  - orcacomputes
  verbs:
  - '*'
- apiGroups:
  - cache.orcacompute.com
  resources:
  - orcacomputes/status
  verbs:
  - get

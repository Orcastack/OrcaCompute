apiVersion: v2
name: orcacompute
description: A Helm chart for OrcaCompute
type: application
version: 0.1.0
appVersion: "1.0.0"

keywords:
  - orcacompute
  - platform
  - django
  - react
  - postgresql
  - redis

home: https://orcacompute.com
sources:
  - https://github.com/orcacompute/platform

maintainers:
  - name: OrcaCompute DevOps Team
    email: devops@orcacompute.com

dependencies:
  - name: postgresql
    version: ">=10.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: ">=16.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled